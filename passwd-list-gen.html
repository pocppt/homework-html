<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>批量密码生成器</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        input[type="range"] {
            flex: 1;
            height: 8px;
            border-radius: 5px;
            background: #ddd;
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
            transition: background 0.3s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            background: #5a6fd6;
        }

        .length-value {
            font-size: 20px;
            font-weight: bold;
            color: #667eea;
            min-width: 40px;
            text-align: center;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input[type="checkbox"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #667eea;
        }

        .form-group select {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        .form-group select:focus {
            outline: none;
            border-color: #667eea;
        }

        .special-characters {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }

        .password-list-container {
            flex: 1;
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            overflow-y: auto;
            margin-bottom: 20px;
            max-height: 400px;
        }

        .password-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: white;
            border-radius: 8px;
            margin-bottom: 8px;
            border: 1px solid #e0e0e0;
            transition: all 0.2s;
        }

        .password-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.1);
        }

        .password-item .number {
            color: #999;
            font-size: 14px;
            margin-right: 10px;
        }

        .password-item .password {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            color: #333;
            word-break: break-all;
            flex: 1;
        }

        .password-item .copy-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            margin-left: 10px;
            transition: background 0.2s;
        }

        .password-item .copy-btn:hover {
            background: #5a6fd6;
        }

        .btn-group {
            display: flex;
            gap: 15px;
        }

        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-generate {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-copy-all {
            background: #28a745;
            color: white;
        }

        .btn-copy-all:hover {
            background: #218838;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(40, 167, 69, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .empty-list {
            text-align: center;
            color: #999;
            padding: 40px 20px;
        }

        .empty-list p {
            margin-top: 10px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background: #e9ecef;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #555;
        }

        .stats span {
            font-weight: 600;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔒 批量密码生成器</h1>

        <div class="form-group">
            <label for="passwordLength">密码长度: <span id="lengthValue" class="length-value">12</span></label>
            <div class="slider-container">
                <input type="range" id="passwordLength" min="6" max="16" value="12">
            </div>
        </div>

        <div class="form-group">
            <div class="checkbox-group">
                <input type="checkbox" id="includeSpecial" checked>
                <label for="includeSpecial">包含特殊字符</label>
            </div>
            <div class="special-characters">特殊字符: !@#$%*()-</div>
        </div>

        <div class="form-group">
            <label for="maxSpecialChars">特殊字符最大个数: <span id="maxSpecialValue" class="length-value">2</span></label>
            <select id="maxSpecialChars">
                <option value="0">0 个（不包含特殊字符）</option>
                <option value="1">1 个</option>
                <option value="2" selected>2 个</option>
                <option value="3">3 个</option>
            </select>
        </div>

        <div class="form-group">
            <label for="passwordCount">生成数量: <span id="countValue" class="length-value">10</span></label>
            <div class="slider-container">
                <input type="range" id="passwordCount" min="10" max="100" value="10" step="10">
            </div>
        </div>

        <div class="stats">
            <span>已生成: <span id="generatedCount">0</span> 个</span>
            <span>总长度: <span id="totalCount">0</span> 字符</span>
        </div>

        <div class="password-list-container" id="passwordList">
            <div class="empty-list">
                <p>点击"生成密码"按钮创建密码列表</p>
            </div>
        </div>

        <div class="btn-group">
            <button class="btn btn-generate" id="generateBtn">生成密码</button>
            <button class="btn btn-copy-all" id="copyAllBtn">复制全部</button>
        </div>
    </div>

    <script>
        // 密码字符集
        const LOWERCASE = 'abcdefghijklmnopqrstuvwxyz';
        const UPPERCASE = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        const DIGITS = '0123456789';
        const SPECIAL_CHARS = '!@#$%*()-';

        // DOM 元素
        const passwordLengthInput = document.getElementById('passwordLength');
        const lengthValueDisplay = document.getElementById('lengthValue');
        const includeSpecialCheckbox = document.getElementById('includeSpecial');
        const maxSpecialCharsSelect = document.getElementById('maxSpecialChars');
        const maxSpecialValueDisplay = document.getElementById('maxSpecialValue');
        const passwordCountInput = document.getElementById('passwordCount');
        const countValueDisplay = document.getElementById('countValue');
        const passwordList = document.getElementById('passwordList');
        const generatedCountDisplay = document.getElementById('generatedCount');
        const totalCountDisplay = document.getElementById('totalCount');
        const generateBtn = document.getElementById('generateBtn');
        const copyAllBtn = document.getElementById('copyAllBtn');

        // 更新长度显示
        passwordLengthInput.addEventListener('input', function() {
            lengthValueDisplay.textContent = this.value;
        });

        // 更新特殊字符最大个数显示
        maxSpecialCharsSelect.addEventListener('change', function() {
            const value = this.value;
            maxSpecialValueDisplay.textContent = value === '0' ? '0' : value + ' 个';
        });

        // 更新数量显示
        passwordCountInput.addEventListener('input', function() {
            countValueDisplay.textContent = this.value;
        });

        // 生成随机数
        function getRandomInt(min, max) {
            const range = max - min + 1;
            const maxRange = 256;
            const limit = Math.floor(256 / range) * range;
            
            let randomValue;
            do {
                const array = new Uint8Array(1);
                window.crypto.getRandomValues(array);
                randomValue = array[0];
            } while (randomValue >= limit);
            
            return min + (randomValue % range);
        }

        // 从字符集中随机选择一个字符
        function getRandomChar(charset) {
            const index = getRandomInt(0, charset.length - 1);
            return charset[index];
        }

        // 生成单个密码
        function generatePassword() {
            const length = parseInt(passwordLengthInput.value);
            const includeSpecial = includeSpecialCheckbox.checked;
            const maxSpecial = parseInt(maxSpecialCharsSelect.value);

            // 构建字符集
            let charset = LOWERCASE + UPPERCASE + DIGITS;
            let specialCharset = SPECIAL_CHARS;

            // 如果不包含特殊字符或最大个数为0，直接生成普通密码
            if (!includeSpecial || maxSpecial === 0) {
                let password = '';
                for (let i = 0; i < length; i++) {
                    password += getRandomChar(charset);
                }
                return password;
            }

            // 确保特殊字符数量在 1 到 maxSpecial 之间
            const specialCount = getRandomInt(1, Math.min(maxSpecial, length - 1));
            const normalCount = length - specialCount;

            // 生成普通字符部分
            let passwordChars = [];
            for (let i = 0; i < normalCount; i++) {
                passwordChars.push(getRandomChar(LOWERCASE + UPPERCASE + DIGITS));
            }

            // 生成特殊字符部分
            for (let i = 0; i < specialCount; i++) {
                passwordChars.push(getRandomChar(specialCharset));
            }

            // 使用 Fisher-Yates 洗牌算法随机打乱字符顺序
            for (let i = passwordChars.length - 1; i > 0; i--) {
                const j = getRandomInt(0, i);
                [passwordChars[i], passwordChars[j]] = [passwordChars[j], passwordChars[i]];
            }

            return passwordChars.join('');
        }

        // 生成密码列表
        function generatePasswordList() {
            const count = parseInt(passwordCountInput.value);
            const passwords = [];

            for (let i = 0; i < count; i++) {
                passwords.push(generatePassword());
            }

            return passwords;
        }

        // 渲染密码列表
        function renderPasswordList(passwords) {
            let html = '';
            let totalLength = 0;

            passwords.forEach((password, index) => {
                totalLength += password.length;
                html += `
                    <div class="password-item">
                        <span class="number">${index + 1}.</span>
                        <span class="password">${password}</span>
                        <button class="copy-btn" onclick="copyPassword('${password.replace(/'/g, "\\'")}')">复制</button>
                    </div>
                `;
            });

            passwordList.innerHTML = html;
            generatedCountDisplay.textContent = passwords.length;
            totalCountDisplay.textContent = totalLength;
        }

        // 复制单个密码
        window.copyPassword = function(password) {
            navigator.clipboard.writeText(password).then(function() {
                alert('密码已复制到剪贴板！');
            }).catch(function(err) {
                const textarea = document.createElement('textarea');
                textarea.value = password;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('密码已复制到剪贴板！');
            });
        };

        // 生成按钮点击事件
        generateBtn.addEventListener('click', function() {
            const passwords = generatePasswordList();
            renderPasswordList(passwords);
        });

        // 复制全部按钮点击事件
        copyAllBtn.addEventListener('click', function() {
            const passwordItems = document.querySelectorAll('.password-item .password');
            
            if (passwordItems.length === 0) {
                alert('请先生成密码！');
                return;
            }

            const passwords = Array.from(passwordItems).map(item => item.textContent);
            const allPasswords = passwords.join('\n');

            navigator.clipboard.writeText(allPasswords).then(function() {
                const originalText = copyAllBtn.textContent;
                copyAllBtn.textContent = '✓ 已复制全部';
                copyAllBtn.style.background = '#218838';
                
                setTimeout(function() {
                    copyAllBtn.textContent = originalText;
                    copyAllBtn.style.background = '';
                }, 2000);
            }).catch(function(err) {
                const textarea = document.createElement('textarea');
                textarea.value = allPasswords;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('密码已复制到剪贴板！');
            });
        });

        // 页面加载时生成一个初始密码列表
        window.addEventListener('load', function() {
            const initialPasswords = generatePasswordList();
            renderPasswordList(initialPasswords);
        });
    </script>
</body>
</html>
